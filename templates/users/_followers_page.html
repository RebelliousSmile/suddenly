{% load i18n %}
{% for follow in page_obj %}
    <div class="card card-body flex items-center gap-3">
        <a href="{% url 'users:profile' username=follow.follower.username %}" class="shrink-0">
            {% if follow.follower.avatar %}
                <img src="{{ follow.follower.avatar.url }}" alt="" class="avatar-md">
            {% else %}
                <span class="avatar-md avatar-placeholder">
                    <span class="i-lucide-user text-sm"></span>
                </span>
            {% endif %}
        </a>
        <div class="min-w-0 flex-1">
            <a href="{% url 'users:profile' username=follow.follower.username %}"
               class="font-medium text-sm text-semantic-ink hover:underline block truncate">
                {{ follow.follower.get_display_name }}
            </a>
            <span class="text-xs text-semantic-muted">@{{ follow.follower.username }}</span>
        </div>
    </div>
{% empty %}
    <p class="text-sm text-semantic-muted">{% trans "No followers yet." %}</p>
{% endfor %}
{% if page_obj.has_next %}
    <div hx-get="?page={{ page_obj.next_page_number }}"
         hx-trigger="revealed"
         hx-swap="outerHTML"></div>
{% endif %}
