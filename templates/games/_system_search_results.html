{# Partial: game system autocomplete results #}
{% load i18n %}

{% if results %}
    {% for system in results %}
    <button type="button"
            class="w-full text-left px-3 py-2 text-sm text-primary hover:bg-card-dark/50 transition-colors"
            @click="systemName = '{{ system.name|escapejs }}'; systemSlug = '{{ system.slug|escapejs }}'; showDropdown = false">
        {{ system.name }}
        <span class="text-xs text-muted ml-1">{{ system.slug }}</span>
    </button>
    {% endfor %}
    <button type="button"
            class="w-full text-left px-3 py-2 text-sm text-muted hover:bg-card-dark/50 transition-colors border-t border-border"
            @click="systemName = ''; systemSlug = '__custom__'; showDropdown = false">
        {% trans "Custom system..." %}
    </button>
{% else %}
    {% if q|length >= 2 %}
    <p class="px-3 py-2 text-sm text-muted">{% trans "No system found." %}</p>
    {% endif %}
    <button type="button"
            class="w-full text-left px-3 py-2 text-sm text-muted hover:bg-card-dark/50 transition-colors"
            @click="systemName = ''; systemSlug = '__custom__'; showDropdown = false">
        {% trans "Custom system..." %}
    </button>
{% endif %}
