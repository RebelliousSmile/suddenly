{% load i18n %}
{% for rapport in page_obj %}
    {% include "games/partials/thread_rapport_card.html" with rapport=rapport report=report %}
{% empty %}
    <p class="text-muted text-sm">{% trans "No rapports yet." %}</p>
{% endfor %}

{% if has_next %}
<div
    hx-get="?mode=flux&page={{ next_page }}"
    hx-trigger="revealed"
    hx-swap="outerHTML"
    class="h-8"
></div>
{% endif %}
