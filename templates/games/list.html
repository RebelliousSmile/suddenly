{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Games" %} — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-8">
    <div class="container-app">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-900">{% trans "Games" %}</h1>
            {% if user.is_authenticated %}
                <a href="{% url 'games:create' %}" class="btn-primary btn-sm">
                    <span class="i-lucide-plus"></span>
                    {% trans "New game" %}
                </a>
            {% endif %}
        </div>

        <div id="game-results">
            {% include "games/_list_results.html" %}
        </div>
    </div>
</section>
{% endblock %}
