{# Partial: recommend button state (swapped by HTMX) #}
{% load i18n %}
{% if recommended %}
    <span class="btn-ghost btn-sm text-crimson">
        <span class="i-lucide-sparkles text-sm"></span>
        {% trans "Recommended" %}
    </span>
{% else %}
    <button hx-post="{% url 'feed:recommend' %}"
            hx-vals='{"report_id": "{{ report.pk }}"}'
            hx-target="this"
            hx-swap="outerHTML"
            class="btn-ghost btn-sm">
        <span class="i-lucide-sparkles text-sm"></span>
        {% trans "Recommend" %}
    </button>
{% endif %}
