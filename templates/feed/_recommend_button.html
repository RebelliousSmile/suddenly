{# Partial: recommend button state (swapped by HTMX). #155 — a real toggle. #}
{% load i18n %}
{% if recommended %}
    <button hx-post="{% url 'feed:recommend' %}"
            hx-vals='{"report_id": "{{ report.pk }}"}'
            hx-target="this"
            hx-swap="outerHTML"
            class="btn-ghost btn-sm tap-target text-brand-primary"
            aria-pressed="true"
            aria-label="{% trans 'Remove recommendation from this scene' %}">
        <span class="i-lucide-sparkles text-sm" aria-hidden="true"></span>
        {% trans "Recommended" %}
    </button>
{% else %}
    <button hx-post="{% url 'feed:recommend' %}"
            hx-vals='{"report_id": "{{ report.pk }}"}'
            hx-target="this"
            hx-swap="outerHTML"
            class="btn-ghost btn-sm tap-target"
            aria-pressed="false"
            aria-label="{% trans 'Recommend this scene' %}">
        <span class="i-lucide-sparkles text-sm" aria-hidden="true"></span>
        {% trans "Recommend" %}
    </button>
{% endif %}
