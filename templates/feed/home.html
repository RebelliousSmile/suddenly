{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Feed" %} — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-8">
    <div class="container-app max-w-3xl">

        <h1 class="text-2xl font-bold text-semantic-ink mb-6">{% trans "Feed" %}</h1>

        <!-- Scope tabs -->
        <div class="flex border-b border-semantic-border mb-6">
            <a href="{% url 'feed:home' %}"
               class="px-4 py-2 text-sm font-medium border-b-2 -mb-px
                      {% if active_tab == 'subscriptions' %}border-brand-primary text-brand-primary{% else %}border-transparent text-semantic-muted hover:text-semantic-ink-secondary{% endif %}"
               {% if active_tab != 'subscriptions' %}hx-get="{% url 'feed:home' %}" hx-target="#feed-content" hx-push-url="true"{% endif %}>
                <span class="i-lucide-users text-sm mr-1"></span>
                {% trans "Friends" %}
            </a>
            <a href="{% url 'feed:instance' %}"
               class="px-4 py-2 text-sm font-medium border-b-2 -mb-px
                      {% if active_tab == 'instance' %}border-brand-primary text-brand-primary{% else %}border-transparent text-semantic-muted hover:text-semantic-ink-secondary{% endif %}"
               {% if active_tab != 'instance' %}hx-get="{% url 'feed:instance' %}" hx-target="#feed-content" hx-push-url="true"{% endif %}>
                <span class="i-lucide-home text-sm mr-1"></span>
                {% trans "Township" %}
            </a>
            <a href="{% url 'feed:fediverse' %}"
               class="px-4 py-2 text-sm font-medium border-b-2 -mb-px
                      {% if active_tab == 'fediverse' %}border-brand-primary text-brand-primary{% else %}border-transparent text-semantic-muted hover:text-semantic-ink-secondary{% endif %}"
               {% if active_tab != 'fediverse' %}hx-get="{% url 'feed:fediverse' %}" hx-target="#feed-content" hx-push-url="true"{% endif %}>
                <span class="i-lucide-globe text-sm mr-1"></span>
                {% trans "World" %}
            </a>
        </div>

        <!-- Feed content (swapped by HTMX).
             Available NPCs are interleaved as claim/adopt/fork promocards
             directly in the feed stream (SUD-P1), not shown as a separate block. -->
        <div id="feed-content">
            {% include "feed/_feed_items.html" %}
        </div>

    </div>
</section>
{% endblock %}
