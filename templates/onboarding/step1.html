{% extends "base.html" %}

{% block title %}Bienvenue — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-12">
    <div class="container-app max-w-lg">

        <p class="text-sm text-gray-500 mb-2">Étape 1 de 3</p>
        <h1 class="text-2xl font-bold text-gray-900 mb-6">
            Bienvenue sur {{ SITE_NAME }}, {{ user.username }} !
        </h1>

        <form method="post" class="card card-body space-y-4">
            {% csrf_token %}

            <div>
                <label for="display_name" class="form-label">
                    Nom d'affichage <span class="text-gray-500">(optionnel)</span>
                </label>
                <input type="text" id="display_name" name="display_name"
                       value="{{ user.display_name|default:'' }}"
                       placeholder="Comment voulez-vous être appelé ?"
                       class="form-input">
            </div>

            <div>
                <label for="bio" class="form-label">
                    Biographie <span class="text-gray-500">(optionnel)</span>
                </label>
                <textarea id="bio" name="bio" rows="3"
                          placeholder="Présentez-vous en quelques mots..."
                          class="form-input">{{ user.bio|default:'' }}</textarea>
            </div>

            <div class="flex items-center justify-between pt-4">
                <a href="{% url 'feed:onboarding_step2' %}" class="link-muted text-sm">
                    Passer cette étape
                </a>
                <button type="submit" class="btn-primary">
                    Continuer
                    <span class="i-lucide-arrow-right text-sm"></span>
                </button>
            </div>
        </form>

    </div>
</section>
{% endblock %}
