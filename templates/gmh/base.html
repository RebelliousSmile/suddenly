{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container-app py-8">
    <div class="flex flex-col @md:flex-row gap-8">

        <!-- Sidebar navigation -->
        <aside class="@md:w-56 flex-shrink-0">
            <nav class="card card-body space-y-1">
                <p class="text-xs font-semibold text-semantic-muted uppercase tracking-wider mb-3">
                    {% trans "Dashboard" %}
                </p>

                <a href="{% url 'gmh:dashboard' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors
                          {% if request.resolver_match.url_name == 'dashboard' %}text-semantic-ink font-semibold bg-semantic-card-sunken{% else %}text-semantic-ink-secondary hover:text-semantic-ink hover:bg-semantic-card-sunken{% endif %}">
                    <span class="i-lucide-layout-dashboard text-base"></span>
                    {% trans "Overview" %}
                </a>

                <a href="{% url 'gmh:instance_settings' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors
                          {% if request.resolver_match.url_name == 'instance_settings' %}text-semantic-ink font-semibold bg-semantic-card-sunken{% else %}text-semantic-ink-secondary hover:text-semantic-ink hover:bg-semantic-card-sunken{% endif %}">
                    <span class="i-lucide-settings text-base"></span>
                    {% trans "Instance settings" %}
                </a>

                <a href="{% url 'gmh:instances' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors
                          {% if request.resolver_match.url_name == 'instances' or request.resolver_match.url_name == 'instance_block' or request.resolver_match.url_name == 'instance_unblock' %}text-semantic-ink font-semibold bg-semantic-card-sunken{% else %}text-semantic-ink-secondary hover:text-semantic-ink hover:bg-semantic-card-sunken{% endif %}">
                    <span class="i-lucide-globe text-base"></span>
                    {% trans "Federated instances" %}
                </a>

                <a href="{% url 'gmh:users' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors
                          {% if request.resolver_match.url_name == 'users' or request.resolver_match.url_name == 'user_suspend' or request.resolver_match.url_name == 'user_unblock' %}text-semantic-ink font-semibold bg-semantic-card-sunken{% else %}text-semantic-ink-secondary hover:text-semantic-ink hover:bg-semantic-card-sunken{% endif %}">
                    <span class="i-lucide-users text-base"></span>
                    {% trans "Users" %}
                </a>

                <a href="{% url 'gmh:reports' %}"
                   class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-colors
                          {% if request.resolver_match.url_name == 'reports' or request.resolver_match.url_name == 'report_dismiss' or request.resolver_match.url_name == 'user_block' %}text-semantic-ink font-semibold bg-semantic-card-sunken{% else %}text-semantic-ink-secondary hover:text-semantic-ink hover:bg-semantic-card-sunken{% endif %}">
                    <span class="i-lucide-flag text-base"></span>
                    {% trans "Reports" %}
                </a>
            </nav>
        </aside>

        <!-- Main content area -->
        <main class="flex-1 min-w-0">
            {% block gmh_content %}{% endblock %}
        </main>

    </div>
</div>
{% endblock %}
