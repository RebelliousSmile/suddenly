{#
  Password Strength Component — real-time strength meter

  Usage:
    {% include "components/password_strength.html" with field_id="id_password1" %}

  Props:
    field_id — id of the password input to watch
#}

<div x-data="passwordStrength('{{ field_id }}')" x-show="strength > 0" x-cloak class="mt-1">
    <!-- Barre de force -->
    <div class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all duration-300"
             :class="{
                 'w-1/4 bg-red-500': strength === 1,
                 'w-2/4 bg-amber-500': strength === 2,
                 'w-3/4 bg-emerald-400': strength === 3,
                 'w-full bg-emerald-600': strength === 4
             }"></div>
    </div>
    <!-- Label -->
    <p class="text-xs mt-1"
       :class="{
           'text-red-600': strength === 1,
           'text-amber-600': strength === 2,
           'text-emerald-600': strength >= 3
       }"
       x-text="label"></p>
</div>
