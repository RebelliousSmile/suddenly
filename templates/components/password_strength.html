{% comment %}
  Password Strength Component — real-time strength meter

  Usage:
    {% include "components/password_strength.html" with field_id="id_password1" %}

  Props:
    field_id — id of the password input to watch
{% endcomment %}

<div x-data="passwordStrength('{{ field_id }}')" x-show="strength > 0" x-cloak class="mt-1">
    <!-- Barre de force -->
    <div class="w-full h-1.5 bg-semantic-card-sunken rounded-full overflow-hidden">
        <div class="h-full rounded-full transition-all duration-300"
             :class="{
                 'w-1/4 bg-semantic-danger/100': strength === 1,
                 'w-2/4 bg-semantic-warning/100': strength === 2,
                 'w-3/4 bg-semantic-success': strength === 3,
                 'w-full bg-semantic-success': strength === 4
             }"></div>
    </div>
    <!-- Label -->
    <p class="text-xs mt-1"
       :class="{
           'text-semantic-danger': strength === 1,
           'text-semantic-warning': strength === 2,
           'text-semantic-success': strength >= 3
       }"
       x-text="label"></p>
</div>
