{% load i18n %}
{% comment %}
  Status Banner Component
  Props: type (info|warning|success|error), icon, message, action_label, action_url, dismiss
{% endcomment %}

<div class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm
    {% if type == 'info' %}bg-semantic-info/10 text-semantic-info border border-semantic-info/30
    {% elif type == 'warning' %}bg-semantic-warning/10 text-semantic-warning border border-semantic-warning/30
    {% elif type == 'success' %}bg-semantic-success/10 text-semantic-success border border-semantic-success/30
    {% elif type == 'error' %}bg-semantic-danger/10 text-semantic-danger border border-semantic-danger/30
    {% endif %}"
    {% if dismiss %}x-data="{ show: true }" x-show="show"{% endif %}>

    <span class="i-lucide-{{ icon }} text-base flex-shrink-0"></span>

    <p class="flex-1">{{ message }}</p>

    {% if action_label and action_url %}
        <a href="{{ action_url }}" class="font-medium underline flex-shrink-0">
            {{ action_label }}
        </a>
    {% endif %}

    {% if dismiss %}
        <button @click="show = false" class="flex-shrink-0 opacity-60 hover:opacity-100" aria-label="{% trans 'Dismiss' %}">
            <span class="i-lucide-x text-sm" aria-hidden="true"></span>
        </button>
    {% endif %}
</div>
