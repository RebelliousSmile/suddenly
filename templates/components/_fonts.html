{% load static %}
<style>
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("{% static 'fonts/inter-400.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url("{% static 'fonts/inter-500.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url("{% static 'fonts/inter-600.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("{% static 'fonts/inter-700.woff2' %}") format('woff2');
}
/* Fraunces — la serif de fiction (font.family.display du contrat).
   Fonte VARIABLE : un seul fichier couvre les graisses 400 à 700, et l'axe
   optique (opsz) adapte le dessin à la taille de rendu — c'est ce qui la rend
   lisible en légende comme en titre de hero.
   L'italique est un fichier distinct : elle PORTE DU SENS dans ce système
   (elle marque la description narrative), elle n'est pas une simple emphase. */
@font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url("{% static 'fonts/fraunces-var.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Fraunces';
    font-style: italic;
    font-weight: 400 700;
    font-display: swap;
    src: url("{% static 'fonts/fraunces-var-italic.woff2' %}") format('woff2');
}
</style>
<link rel="preload" as="font" type="font/woff2" crossorigin href="{% static 'fonts/inter-400.woff2' %}">
<link rel="preload" as="font" type="font/woff2" crossorigin href="{% static 'fonts/inter-600.woff2' %}">
