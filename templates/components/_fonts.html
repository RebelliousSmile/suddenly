{% load static %}
<style>
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("{% static 'fonts/inter-400.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url("{% static 'fonts/inter-500.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url("{% static 'fonts/inter-600.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("{% static 'fonts/inter-700.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Crimson Text';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("{% static 'fonts/crimson-text-400.woff2' %}") format('woff2');
}
@font-face {
    font-family: 'Crimson Text';
    font-style: italic;
    font-weight: 400;
    font-display: swap;
    src: url("{% static 'fonts/crimson-text-400-italic.woff2' %}") format('woff2');
}
</style>
<link rel="preload" as="font" type="font/woff2" crossorigin href="{% static 'fonts/inter-400.woff2' %}">
<link rel="preload" as="font" type="font/woff2" crossorigin href="{% static 'fonts/inter-600.woff2' %}">
