{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Bad request" %} — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-24">
    <div class="container-app text-center">
        <span class="i-lucide-triangle-alert text-6xl text-muted mb-6 block mx-auto"></span>
        <h1 class="text-2xl font-bold text-primary mb-2">{% trans "Bad request" %}</h1>
        <p class="text-muted mb-6">
            {% trans "Your request could not be processed. Please check the URL and try again." %}
        </p>
        <div class="flex items-center justify-center gap-3">
            <a href="/" class="btn-primary">{% trans "Back to home" %}</a>
        </div>
    </div>
</section>
{% endblock %}
