{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Access denied" %} — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="py-24">
    <div class="container-app text-center">
        <span class="i-lucide-shield-x text-6xl text-gray-300 mb-6 block mx-auto"></span>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">{% trans "Access denied" %}</h1>
        <p class="text-gray-500 mb-6">
            {% trans "You do not have permission to access this page." %}
        </p>
        <div class="flex items-center justify-center gap-3">
            <a href="/" class="btn-primary">{% trans "Back to home" %}</a>
            <a href="{% url 'account_login' %}" class="btn-secondary">{% trans "Log in" %}</a>
        </div>
    </div>
</section>
{% endblock %}
