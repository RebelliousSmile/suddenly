{% extends "base.html" %}
{% load static i18n %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/docs-pygments.css' %}">
{% endblock %}

{% block content %}
<div class="container-app py-8">
  <div class="flex gap-8">
    <!-- Sidebar -->
    <aside class="w-64 shrink-0">
      <div class="sticky top-20 self-start">
        {% include "components/docs_sidebar.html" %}
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 min-w-0">
      {% block doc_content %}{% endblock %}
    </main>
  </div>
</div>

<!-- Back to top -->
<div x-data="{ visible: false }"
     @scroll.window="visible = window.scrollY > 400"
     x-cloak>
  <button x-show="visible"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 translate-y-2"
          x-transition:enter-end="opacity-100 translate-y-0"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-100 translate-y-0"
          x-transition:leave-end="opacity-0 translate-y-2"
          @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
          class="fixed bottom-6 right-6 z-50 w-10 h-10 rounded-full bg-surface border border-border shadow-lg flex items-center justify-center text-secondary hover:text-primary hover:border-crimson transition-colors"
          aria-label="Retour en haut">
    <span class="i-lucide-arrow-up text-lg"></span>
  </button>
</div>
{% endblock %}
