repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-po-fuzzy
        name: no fuzzy or untranslated entries in fr.po
        entry: python scripts/check_po_integrity.py
        language: system
        files: ^locale/fr/.*\.po$
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [suddenly/]
        pass_filenames: false
        stages: [pre-push]

      - id: design-lint
        name: design system lint (tokens + colour namespaces)
        entry: node design/lint/lint-files.mjs
        language: system
        files: ^templates/.*\.html$
        exclude: ^templates/(wireframes/|500\.html$)
        pass_filenames: true
