repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs>=4.2
        args: [--strict]

  - repo: local
    hooks:
      - id: generate-knowledge
        name: generate KNOWLEDGE.md from memory bank
        entry: python scripts/generate_knowledge.py
        language: system
        files: ^aidd_docs/memory/
        pass_filenames: false
