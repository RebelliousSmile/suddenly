repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [suddenly/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: generate-knowledge
        name: generate KNOWLEDGE.md from memory bank
        entry: python scripts/generate_knowledge.py
        language: system
        files: ^aidd_docs/memory/
        pass_filenames: false
