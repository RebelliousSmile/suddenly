# docker-compose.dev.yml
# Usage: docker compose -f docker-compose.dev.yml up
#
# Développement local avec hot-reload et debug

services:
  web:
    build:
      context: .
      target: dev
    command: >
      sh -c "pip install -e '.[dev,federation]' &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://suddenly:suddenly@db:5432/suddenly
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - DOMAIN=localhost:8000
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=true
      - ALLOWED_HOSTS=localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    networks:
      - suddenly-dev

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=suddenly
      - POSTGRES_PASSWORD=suddenly
      - POSTGRES_DB=suddenly
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suddenly -d suddenly"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - suddenly-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - suddenly-dev

  # Worker Celery (opt-in: docker compose -f docker-compose.dev.yml --profile celery up)
  celery:
    build:
      context: .
      target: dev
    command: celery -A suddenly worker -l debug
    environment:
      - DATABASE_URL=postgres://suddenly:suddenly@db:5432/suddenly
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - DOMAIN=localhost:8000
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=true
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    profiles:
      - celery
    networks:
      - suddenly-dev

  # Mailhog pour tester les emails (opt-in: --profile mail)
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - mail
    networks:
      - suddenly-dev

volumes:
  pgdata-dev:
  pip-cache:

networks:
  suddenly-dev:
    driver: bridge
